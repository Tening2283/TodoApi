stages:
  - build
  - docker
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# -------------------------------------------------------------------
# Étape 1 : Build .NET
# -------------------------------------------------------------------
build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet restore
    - dotnet build -c Release

# -------------------------------------------------------------------
# Étape 2 : Build image Docker → GitLab Container Registry
# -------------------------------------------------------------------
docker-build:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  only:
    - main

# -------------------------------------------------------------------
# Étape 3 : Déploiement via SSH (manuel)
# -------------------------------------------------------------------
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $DEPLOY_USER@$DEPLOY_HOST "
        docker pull $DOCKER_IMAGE_LATEST &&
        docker stop todo_api || true &&
        docker rm todo_api || true &&
        docker run -d --name todo_api -p 8080:8080
          -e ASPNETCORE_ENVIRONMENT=Production
          -e ASPNETCORE_URLS=http://+:8080
          -e JwtSettings__Secret=$JWT_SECRET
          -e JwtSettings__Issuer=TodoApi
          -e JwtSettings__Audience=TodoApiUsers
          $DOCKER_IMAGE_LATEST
      "
  only:
    - main
  when: manual
